version: "3.9"

services:
  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: placement
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: placement_db
    volumes:
      - mongo_data:/data/db
    ports:
      # Expose MongoDB to the host so `npm run dev` (backend on your machine) can connect
      - "${MONGO_HOST_PORT:-27017}:27017"
    networks:
      - placement-net
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Backend (Node.js / Express / TypeScript) ────────────────────────────────
  backend:
    image: 505017489008.dkr.ecr.us-east-1.amazonaws.com/placement-portal-backend:latest
    build:                  # fallback for local `docker compose build`
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://placement:admin123@mongodb:27017/placement_db?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-super-secure-jwt-secret-change-in-production}
      REDIS_URL: ""
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-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}
      EMAIL_USER: ${EMAIL_USER:-anmolgupta1478@gmail.com}
      EMAIL_PASS: ${EMAIL_PASS:-bxpwnuscjqhqsezk}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - placement-net
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Frontend (React + Nginx) ────────────────────────────────────────────────
  frontend:
    image: 505017489008.dkr.ecr.us-east-1.amazonaws.com/placement-portal-frontend:latest
    build:                  # fallback for local `docker compose build`
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-80}:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - placement-net

  # ─── SonarQube (Code Quality & Security Scanning) ───────────────────────────
  sonarqube:
    image: sonarqube:community
    restart: unless-stopped
    ports:
      - "${SONAR_HOST_PORT:-9000}:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - placement-net
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/api/system/status" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ─── Local Docker Registry (replaces AWS ECR) ───────────────────────────────
  registry:
    image: registry:2
    restart: unless-stopped
    ports:
      - "${REGISTRY_HOST_PORT:-5001}:5000"
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - placement-net

# ─── Volumes & Networks ──────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  sonarqube_data:
    driver: local
  sonarqube_logs:
    driver: local
  sonarqube_extensions:
    driver: local
  registry_data:
    driver: local

networks:
  placement-net:
    driver: bridge
