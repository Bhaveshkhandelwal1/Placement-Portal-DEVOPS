version: "3.9"

services:
  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: placement-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: placement
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: placement_db
    volumes:
      - mongo_data:/data/db
    networks:
      - placement-net
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Backend (Node.js / Express / TypeScript) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: placement-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://placement:admin123@mongodb:27017/placement_db?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-super-secure-jwt-secret-change-in-production}
      REDIS_URL: ""
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - placement-net
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Frontend (React + Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: placement-frontend
    restart: unless-stopped
    ports:
      - "80:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - placement-net

# ─── Volumes & Networks ──────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local

networks:
  placement-net:
    driver: bridge
